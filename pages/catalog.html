<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse our complete catalog of building materials, hardware, and tools.">
    <meta name="keywords" content="building materials catalog, construction supplies, hardware store">
    
    <title>Product Catalog | Kishori Iron Store</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="../css/animations.css">
    
    <style>
        .breadcrumb {
            padding: var(--spacing-xl) 0;
            font-size: var(--fs-sm);
        }
        
        .breadcrumb a {
            color: var(--color-primary);
            transition: color var(--transition-fast);
        }
        
        .breadcrumb a:hover {
            color: var(--color-accent);
        }
        
        .breadcrumb-separator {
            margin: 0 var(--spacing-sm);
            color: var(--color-slate-light);
        }
        
        .catalog-wrapper {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: var(--spacing-3xl);
            margin-bottom: var(--spacing-3xl);
        }
        
        .sidebar {
            height: fit-content;
            position: sticky;
            top: 140px;
        }
        
        .filter-group {
            margin-bottom: var(--spacing-2xl);
            padding-bottom: var(--spacing-2xl);
            border-bottom: 1px solid #e5e7eb;
        }
        
        .filter-group:last-child {
            border-bottom: none;
        }
        
        .filter-title {
            font-weight: 700;
            margin-bottom: var(--spacing-lg);
            font-size: 0.95rem;
            color: var(--color-primary);
        }
        
        .filter-option {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-md);
            cursor: pointer;
        }
        
        .filter-option input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .filter-option label {
            flex: 1;
            cursor: pointer;
            font-size: var(--fs-sm);
        }
        
        .catalog-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-2xl);
            gap: var(--spacing-lg);
            flex-wrap: wrap;
        }
        
        .catalog-title {
            margin: 0;
        }
        
        .sort-controls {
            display: flex;
            gap: var(--spacing-md);
            align-items: center;
        }
        
        .sort-select {
            padding: var(--spacing-md);
            border: 2px solid #e5e7eb;
            border-radius: var(--radius-lg);
            font-family: inherit;
            cursor: pointer;
        }
        
        .view-toggle {
            display: flex;
            gap: var(--spacing-sm);
        }
        
        .view-toggle button {
            padding: var(--spacing-sm) var(--spacing-md);
            border: 2px solid #e5e7eb;
            background: var(--color-white);
            cursor: pointer;
            border-radius: var(--radius-md);
            transition: all var(--transition-fast);
        }
        
        .view-toggle button.active {
            background: var(--color-accent);
            color: var(--color-primary);
            border-color: var(--color-accent);
        }
        
        .product-count {
            color: var(--color-slate-light);
            font-size: var(--fs-sm);
        }
        
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: var(--spacing-4xl) var(--spacing-2xl);
        }
        
        .no-results-icon {
            font-size: 4rem;
            margin-bottom: var(--spacing-lg);
        }
        
        @media (max-width: 768px) {
            .catalog-wrapper {
                grid-template-columns: 1fr;
                gap: var(--spacing-2xl);
            }
            
            .sidebar {
                position: static;
            }
            
            .catalog-top {
                flex-direction: column;
                align-items: stretch;
            }
            
            .sort-controls {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <!-- Header (same as index.html) -->
    <header class="main-header" role="banner">
        <!-- [Include same header code as index.html] -->
    </header>

    <main id="main-content">
        
        <div class="container">
            <!-- Breadcrumb -->
            <nav class="breadcrumb" aria-label="Breadcrumb">
                <a href="/">Home</a>
                <span class="breadcrumb-separator">/</span>
                <a href="catalog.html">Shop</a>
                <span class="breadcrumb-separator">/</span>
                <span id="current-category">All Products</span>
            </nav>

            <!-- Catalog Content -->
            <div class="catalog-wrapper">
                
                <!-- Sidebar Filters -->
                <aside class="sidebar" role="navigation" aria-label="Product filters">
                    
                    <!-- Category Filter -->
                    <div class="filter-group">
                        <h3 class="filter-title">Categories</h3>
                        <div class="filter-option">
                            <input type="checkbox" id="all-categories" value="" checked>
                            <label for="all-categories">All Categories</label>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="cat-cement" value="cement">
                            <label for="cat-cement">Cement</label>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="cat-steel" value="steel">
                            <label for="cat-steel">Steel & Rods</label>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="cat-sand" value="sand">
                            <label for="cat-sand">Sand & Aggregates</label>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="cat-bricks" value="bricks">
                            <label for="cat-bricks">Bricks & Blocks</label>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="cat-plumbing" value="plumbing">
                            <label for="cat-plumbing">Plumbing</label>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="cat-electrical" value="electrical">
                            <label for="cat-electrical">Electrical</label>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="cat-tools" value="tools">
                            <label for="cat-tools">Tools & Equipment</label>
                        </div>
                    </div>

                    <!-- Price Range Filter -->
                    <div class="filter-group">
                        <h3 class="filter-title">Price Range</h3>
                        <div class="filter-option">
                            <input type="checkbox" id="price-0-5k" value="0-5000">
                            <label for="price-0-5k">Under ₹5,000</label>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="price-5-10k" value="5000-10000">
                            <label for="price-5-10k">₹5,000 - ₹10,000</label>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="price-10-25k" value="10000-25000">
                            <label for="price-10-25k">₹10,000 - ₹25,000</label>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="price-25k-plus" value="25000-999999">
                            <label for="price-25k-plus">Above ₹25,000</label>
                        </div>
                    </div>

                    <!-- Stock Status -->
                    <div class="filter-group">
                        <h3 class="filter-title">Availability</h3>
                        <div class="filter-option">
                            <input type="checkbox" id="in-stock" value="in-stock" checked>
                            <label for="in-stock">In Stock</label>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="out-of-stock" value="out-of-stock">
                            <label for="out-of-stock">Out of Stock</label>
                        </div>
                    </div>

                    <!-- Clear Filters -->
                    <button id="clear-filters" class="btn btn-outline" style="width: 100%;">Clear All Filters</button>
                </aside>

                <!-- Main Content -->
                <section>
                    <!-- Top Controls -->
                    <div class="catalog-top">
                        <h1 class="catalog-title">All Products</h1>
                        <div class="sort-controls">
                            <span class="product-count"><span id="product-count">0</span> products</span>
                            <select class="sort-select" id="sort-select" aria-label="Sort by">
                                <option value="featured">Featured</option>
                                <option value="newest">Newest</option>
                                <option value="price-low">Price: Low to High</option>
                                <option value="price-high">Price: High to Low</option>
                                <option value="rating">Best Rating</option>
                            </select>
                        </div>
                    </div>

                    <!-- Products Grid -->
                    <div class="products-grid" id="products-grid">
                        <!-- Products will be loaded here via JavaScript -->
                    </div>

                    <!-- No Results Message -->
                    <div class="no-results" style="display: none;" id="no-results">
                        <div class="no-results-icon">📭</div>
                        <h2>No Products Found</h2>
                        <p>Try adjusting your filters or search terms</p>
                    </div>
                </section>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="main-footer" role="contentinfo">
        <!-- [Include same footer code as index.html] -->
    </footer>

    <!-- WhatsApp Widget -->
    <a href="https://wa.me/919876543210" class="whatsapp-widget" title="Chat on WhatsApp">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="white">
            <!-- WhatsApp SVG -->
        </svg>
    </a>

    <script src="../js/main.js" defer></script>
    <script>
        // Catalog page specific JavaScript
        const allProducts = [
            // Cement
            {id: 1, name: 'OPC Cement - 50kg', category: 'cement', price: 650, rating: 4.8, badge: 'Best Seller'},
            {id: 2, name: 'PPC Cement - 50kg', category: 'cement', price: 720, rating: 4.7, badge: 'Popular'},
            // Steel
            {id: 3, name: 'TMT Rod - 8mm', category: 'steel', price: 8500, rating: 4.9, badge: 'In Stock'},
            {id: 4, name: 'TMT Rod - 10mm', category: 'steel', price: 10200, rating: 4.8, badge: 'Popular'},
            {id: 5, name: 'TMT Rod - 12mm', category: 'steel', price: 11800, rating: 4.9, badge: 'Best Seller'},
            // Sand
            {id: 6, name: 'River Sand', category: 'sand', price: 2500, rating: 4.6, badge: 'In Stock'},
            {id: 7, name: 'Crush Sand', category: 'sand', price: 1800, rating: 4.5, badge: 'Popular'},
            // Bricks
            {id: 8, name: 'Red Bricks', category: 'bricks', price: 8000, rating: 4.7, badge: 'Popular'},
            {id: 9, name: 'Fly Ash Bricks', category: 'bricks', price: 6500, rating: 4.6, badge: 'Eco-Friendly'},
            // Plumbing
            {id: 10, name: 'PVC Pipes', category: 'plumbing', price: 850, rating: 4.8, badge: 'In Stock'},
            {id: 11, name: 'Water Storage Tanks', category: 'plumbing', price: 15000, rating: 4.7, badge: 'Popular'},
            // Electrical
            {id: 12, name: 'Electrical Wires', category: 'electrical', price: 400, rating: 4.7, badge: 'In Stock'},
            {id: 13, name: 'Electrical Panels', category: 'electrical', price: 12000, rating: 4.6, badge: 'Popular'},
            // Tools
            {id: 14, name: 'Power Drill', category: 'tools', price: 3500, rating: 4.8, badge: 'Popular'},
            {id: 15, name: 'Angle Grinder', category: 'tools', price: 2200, rating: 4.7, badge: 'In Stock'}
        ];

        class CatalogManager {
            constructor(products) {
                this.products = products;
                this.filteredProducts = products;
                this.filters = {
                    categories: [],
                    priceRange: [],
                    stockStatus: ['in-stock']
                };
                this.sortBy = 'featured';
                this.init();
            }

            init() {
                this.setupEventListeners();
                this.renderProducts();
            }

            setupEventListeners() {
                // Category filters
                document.querySelectorAll('[id^="cat-"], [id="all-categories"]').forEach(checkbox => {
                    checkbox.addEventListener('change', () => this.handleCategoryFilter());
                });

                // Price filters
                document.querySelectorAll('[id^="price-"]').forEach(checkbox => {
                    checkbox.addEventListener('change', () => this.handlePriceFilter());
                });

                // Stock filters
                document.querySelectorAll('[id^="in-stock"], [id^="out-of-stock"]').forEach(checkbox => {
                    checkbox.addEventListener('change', () => this.handleStockFilter());
                });

                // Sort
                document.getElementById('sort-select').addEventListener('change', (e) => {
                    this.sortBy = e.target.value;
                    this.applyFilters();
                });

                // Clear filters
                document.getElementById('clear-filters').addEventListener('click', () => this.clearFilters());
            }

            handleCategoryFilter() {
                const allCategories = document.getElementById('all-categories');
                const categoryCheckboxes = document.querySelectorAll('[id^="cat-"]');

                if (allCategories.checked) {
                    categoryCheckboxes.forEach(cb => cb.checked = false);
                    this.filters.categories = [];
                } else {
                    this.filters.categories = Array.from(categoryCheckboxes)
                        .filter(cb => cb.checked)
                        .map(cb => cb.value);
                }

                this.applyFilters();
            }

            handlePriceFilter() {
                this.filters.priceRange = Array.from(document.querySelectorAll('[id^="price-"]'))
                    .filter(cb => cb.checked)
                    .map(cb => cb.value);
                this.applyFilters();
            }

            handleStockFilter() {
                this.filters.stockStatus = Array.from(document.querySelectorAll('[id^="in-stock"], [id^="out-of-stock"]'))
                    .filter(cb => cb.checked)
                    .map(cb => cb.value);
                this.applyFilters();
            }

            applyFilters() {
                let filtered = this.products;

                // Category filter
                if (this.filters.categories.length > 0) {
                    filtered = filtered.filter(p => this.filters.categories.includes(p.category));
                }

                // Price filter
                if (this.filters.priceRange.length > 0) {
                    filtered = filtered.filter(p => {
                        return this.filters.priceRange.some(range => {
                            const [min, max] = range.split('-').map(Number);
                            return p.price >= min && p.price <= max;
                        });
                    });
                }

                this.filteredProducts = filtered;
                this.sortProducts();
                this.renderProducts();
            }

            sortProducts() {
                const products = [...this.filteredProducts];

                switch (this.sortBy) {
                    case 'newest':
                        return products.sort((a, b) => b.id - a.id);
                    case 'price-low':
                        return products.sort((a, b) => a.price - b.price);
                    case 'price-high':
                        return products.sort((a, b) => b.price - a.price);
                    case 'rating':
                        return products.sort((a, b) => b.rating - a.rating);
                    default:
                        return products;
                }
            }

            renderProducts() {
                const grid = document.getElementById('products-grid');
                const noResults = document.getElementById('no-results');
                const count = document.getElementById('product-count');

                grid.innerHTML = '';

                if (this.filteredProducts.length === 0) {
                    noResults.style.display = 'block';
                    count.textContent = '0';
                    return;
                }

                noResults.style.display = 'none';
                count.textContent = this.filteredProducts.length;

                this.filteredProducts.forEach(product => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    card.innerHTML = `
                        <div class="product-image">
                            <img src="../aassets/images/products/product-${product.id}.jpg" alt="${product.name}" loading="lazy">
                            <span class="product-badge">${product.badge}</span>
                        </div>
                        <div class="product-info">
                            <h3 class="product-title">${product.name}</h3>
                            <div class="product-specs">
                                <span class="spec">★ ${product.rating}</span>
                            </div>
                            <div class="product-footer">
                                <span class="product-price">From <strong>₹${product.price.toLocaleString()}</strong></span>
                                <button class="btn-inquire" aria-label="Inquire about ${product.name}">Inquire Now</button>
                            </div>
                        </div>
                    `;

                    card.querySelector('.btn-inquire').addEventListener('click', () => {
                        window.KishoriStore.openInquiryModal(product.id, product.name);
                    });

                    grid.appendChild(card);
                });
            }

            clearFilters() {
                document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
                    cb.checked = cb.id === 'all-categories' || cb.id === 'in-stock';
                });
                this.filters = {
                    categories: [],
                    priceRange: [],
                    stockStatus: ['in-stock']
                };
                this.applyFilters();
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            new CatalogManager(allProducts);
        });
    </script>
</body>
</html>
